<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Resume - Jake's Template Style</title>
    <style>
        /* Jake's Resume Style - Modern & ATS Friendly */
        @page {
            size: A4;
            margin: 0.5in;
        }

        @media print {
            body {
                margin: 0;
                padding: 0;
            }
        }

        body {
            font-family: "Times New Roman", Times, serif; /* Classical LaTeX look */
            font-size: 10.5pt;
            line-height: 1.25;
            color: #000;
            margin: 0;
            padding: 0;
            word-wrap: break-word;
        }

        h1 {
            font-size: 18pt;
            text-align: center;
            margin-bottom: 2px;
            margin-top: 0;
            font-weight: normal;
        }

        /* Header link formatting */
        .header-info {
            text-align: center;
            font-size: 9.5pt;
            margin-bottom: 15px;
        }

        .header-info a {
            color: #000;
            text-decoration: none;
        }

        .header-info span:not(:last-child)::after {
            content: " | ";
            margin: 0 4px;
        }

        /* Section Headings */
        h2 {
            font-size: 11pt;
            text-transform: uppercase;
            font-weight: bold;
            border-bottom: 1px solid #000;
            padding-bottom: 1px;
            margin: 12px 0 5px;
            display: block;
            width: 100%;
        }

        /* Project/Experience Titles */
        h3 {
            font-size: 10.5pt;
            margin: 6px 0 2px;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            font-weight: bold;
        }
        
        /* Subtitles (Title, Dates) */
        .subtitle {
            display: flex;
            justify-content: space-between;
            font-style: italic;
            font-size: 10pt;
            margin-bottom: 4px;
        }

        ul {
            margin-left: 18px;
            padding-left: 0;
            margin-top: 2px;
            margin-bottom: 6px;
            list-style-type: disc;
        }

        li {
            margin-bottom: 2px;
            text-align: justify;
        }

        p {
            margin-bottom: 4px;
            margin-top: 0;
        }

        strong {
            font-weight: bold;
        }

        em {
            font-style: italic;
        }

        /* Skills table-like layout */
        .skills-section p {
            margin-bottom: 2px;
        }

        .skills-section strong {
            width: 120px;
            display: inline-block;
        }

        /* Container */
        .resume-container {
            width: 100%;
        }

        /* Support for dual alignment in headers (Name | Date) */
        .split-line {
            display: flex;
            justify-content: space-between;
            width: 100%;
        }

    </style>
</head>
<body>
    <div class="resume-container">
        {{BODY}}
    </div>
</body>
</html>
